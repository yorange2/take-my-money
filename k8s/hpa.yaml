apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: last-key-web-hpa
  namespace: last-key-dev
  labels:
    app: last-key-web
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: last-key-web
  minReplicas: 3
  maxReplicas: 10

  # Metrics for scaling
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80

  # Behavior configuration
  behavior:
    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Percent
          value: 50
          periodSeconds: 60
    scaleUp:
      stabilizationWindowSeconds: 0
      policies:
        - type: Percent
          value: 100
          periodSeconds: 30
        - type: Pods
          value: 2
          periodSeconds: 30
      selectPolicy: Max
