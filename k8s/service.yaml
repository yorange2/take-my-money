apiVersion: v1
kind: Service
metadata:
  name: last-key-web
  namespace: last-key-dev
  labels:
    app: last-key-web
spec:
  type: ClusterIP
  selector:
    app: last-key-web
  ports:
    - name: http
      port: 80
      targetPort: 3000
      protocol: TCP
  # Session affinity for consistent routing
  sessionAffinity: ClientIP
  sessionAffinityConfig:
    clientIP:
      timeoutSeconds: 10800
