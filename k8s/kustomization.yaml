apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: last-key-dev

commonLabels:
  app: last-key-web
  managed-by: kustomize

resources:
  - serviceaccount.yaml
  - configmap.yaml
  - service.yaml
  - deployment.yaml
  - ingress.yaml
  - hpa.yaml

# Patch for image and other configurations
# Can be used for different environments
patches:
# Example: patch deployment for image tag
# - target:
#     kind: Deployment
#     name: last-key-web
#   patch: |-
#     - op: replace
#       path: /spec/template/spec/containers/0/image
#       value: gcr.io/PROJECT_ID/last-key:VERSION_TAG

# Replace your GCP project ID
# Use: kustomize edit set image gcr.io/YOUR_PROJECT_ID/last-key:TAG
images:
  - name: gcr.io/PROJECT_ID/last-key
    newName: gcr.io/YOUR_PROJECT_ID/last-key
    newTag: latest

# Variables for templating (optional)
vars:
  - name: NAMESPACE
    objref:
      kind: ServiceAccount
      name: last-key
      apiVersion: v1
    fieldref:
      fieldpath: metadata.namespace
