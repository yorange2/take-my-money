services:
  postgres:
    image: docker.io/library/postgres:16-alpine
    container_name: last-key-postgres
    environment:
      POSTGRES_USER: ${DB_USER:-dev}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-dev_password}
      POSTGRES_DB: ${DB_NAME:-last_key}
      POSTGRES_INITDB_ARGS: '--encoding=UTF8'
    ports:
      - '${DB_PORT:-35432}:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
      # Optional: initialize database with SQL scripts
      # - ./db/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${DB_USER:-dev}']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - dev-network
    restart: unless-stopped

  redis:
    image: docker.io/library/redis:7-alpine
    container_name: last-key-redis
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-redis_password}
    ports:
      - '${REDIS_PORT:-36379}:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', '--raw', 'incr', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - dev-network
    restart: unless-stopped

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    image: last-key-web:local
    container_name: last-key-web
    ports:
      - '${WEB_PORT:-33000}:3000'
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${DB_USER:-dev}:${DB_PASSWORD:-dev_password}@postgres:5432/${DB_NAME:-last_key}
      REDIS_URL: redis://:${REDIS_PASSWORD:-redis_password}@redis:6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ['CMD', 'node', '-e', "require('http').get('http://localhost:3000', (r) => { if (r.statusCode !== 200) process.exit(1) })"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - dev-network
    restart: unless-stopped

  worker:
    build:
      context: .
      dockerfile: apps/worker/Dockerfile
    image: last-key-worker:local
    container_name: last-key-worker
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${DB_USER:-dev}:${DB_PASSWORD:-dev_password}@postgres:5432/${DB_NAME:-last_key}
      REDIS_URL: redis://:${REDIS_PASSWORD:-redis_password}@redis:6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - dev-network
    restart: unless-stopped

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  dev-network:
    driver: bridge
