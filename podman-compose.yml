services:
  postgres:
    image: docker.io/library/postgres:16-alpine
    container_name: take-my-money-postgres
    environment:
      POSTGRES_USER: ${DB_USER:-dev}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-dev_password}
      POSTGRES_DB: ${DB_NAME:-take_my_money}
      POSTGRES_INITDB_ARGS: '--encoding=UTF8'
    ports:
      - '${DB_PORT:-35432}:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
      # Optional: initialize database with SQL scripts
      # - ./db/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${DB_USER:-dev}']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - dev-network
    restart: unless-stopped

  redis:
    image: docker.io/library/redis:7-alpine
    container_name: take-my-money-redis
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-redis_password}
    ports:
      - '${REDIS_PORT:-36379}:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', '--raw', 'incr', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - dev-network
    restart: unless-stopped

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  dev-network:
    driver: bridge
